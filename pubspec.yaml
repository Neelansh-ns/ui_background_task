name: ui_background_task
description: A Flutter plugin for extending short-running iOS work after an app enters the background, with CocoaPods and Swift Package Manager support.
version: 0.3.0
homepage: https://github.com/Neelansh-ns/ui_background_task
repository: https://github.com/Neelansh-ns/ui_background_task
issue_tracker: https://github.com/Neelansh-ns/ui_background_task/issues

topics:
  - background-task
  - flutter-plugin
  - ios

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  stop_watch_timer: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: UiBackgroundTaskPlugin
